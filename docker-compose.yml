services:
  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /app/data/calendar.db
      PORT: "3000"
      NODE_ENV: production
    volumes:
      - calendar-data:/app/data
    networks:
      - internal

  frontend:
    build: ./client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - internal

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /app/data/calendar.db
      BACKEND_URL: http://backend:3000
      # PUBLIC_URL is read from .env (set it to your public domain)
    volumes:
      - calendar-data:/app/data
      - ./bot/backups:/app/data/backups
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:

volumes:
  calendar-data:
